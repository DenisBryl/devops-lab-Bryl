site_name: Денис Брыль
site_description: Личный сайт и портфолио Дениса Брыля
site_author: Денис Брыль

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: teal
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode 
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share

nav:
  - Главная: index.md
  - Обо мне: about.md
  - Проекты: projects.md
  - Контакты: contacts.md

plugins:
  - search